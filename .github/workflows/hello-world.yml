# Line 1: Name of your workflow. This appears in the GitHub Actions tab.
name: Hello World Workflow

# Line 2: WHEN should this workflow run? (The trigger)
on:
  push:                       # Run whenever someone pushes code
    branches: [main]          # But only on the main branch

# Line 6: Define the jobs (tasks) to run
jobs:
  # Line 7: Job ID (unique identifier for this job)
  say-hello:
    # Line 8: Name displayed in the GitHub UI
    name: Say Hellooooooooooooooooooooooooooooo
    
    # Line 10: What machine to run on (the "runner")
    runs-on: ubuntu-latest    # Use GitHub's Ubuntu virtual machine
    
    # Line 12: The steps to execute (run in order)
    steps:
      # Line 13: Each step has a name and an action/command
      - name: Print Hello World
        # Line 15: The actual command to run (bash command)
        run: echo "Hello, World! 🚀"
      
      # Line 17: Another step - show current date
      - name: Show Current Date
        run: date
      
      # Line 20: Show what OS we're running on
      - name: Show OS Info
        run: uname -a
